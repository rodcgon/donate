<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Endereços/ Addresses</title>
<style>
  :root{--bg:#ffffff;--fg:#0b0b0b;--muted:#666;--accent:#111}
  body{font-family:system-ui,Arial,Helvetica,sans-serif;background:var(--bg);color:var(--fg);margin:28px;line-height:1.35}
  h1{font-size:1.2rem;margin-bottom:12px}
  .grid{max-width:720px;margin:0 auto}
  .card{display:flex;align-items:center;gap:14px;border:1px solid #eee;padding:14px;border-radius:10px;margin:12px 0}
  .meta{flex:1}
  .label{font-weight:700;margin-bottom:6px}
  .addr{font-family:monospace;background:#fafafa;padding:8px;border-radius:6px;border:1px solid #f0f0f0;word-break:break-all;color:var(--muted)}
  .actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .btn{background:var(--accent);color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:600}
  .linkbtn{background:#fff;color:var(--accent);border:1px solid #ddd;padding:8px 12px;border-radius:8px;cursor:pointer;text-decoration:none}
  .qr{width:96px;height:96px;display:flex;align-items:center;justify-content:center}
  footer{margin-top:18px;color:var(--muted);font-size:0.9rem}
  @media(max-width:560px){.card{flex-direction:column;align-items:flex-start}.actions{width:100%;flex-direction:row;justify-content:space-between}}
</style>
</head>
<body>
<div class="grid">
  <h1>Doações</h1>

  <!-- PIX: apenas link, sem QR -->
  <div class="card" data-type="pix" data-label="PIX">
    <div class="meta">
      <div class="label">PIX</div>
      <div class="addr">https://dentpeg.com/checkout/pluginsgis-rcg</div>
    </div>
    <div class="qr" aria-hidden="true"></div>
    <div class="actions">
      <button class="btn copy" data-copy="https://dentpeg.com/checkout/pluginsgis-rcg">Copiar</button>
      <a class="linkbtn open" href="https://dentpeg.com/checkout/pluginsgis-rcg" target="_blank" rel="noopener">Abrir</a>
    </div>
  </div>

  <!-- USDT TRON: QR com apenas o endereço (sem 'tron:'), copiar endereço puro, abrir usa tron:URI -->
  <div class="card" data-addr="TSMgEtSWjXbCM68RVJZj5kFPdh6GPLc5C2" data-type="tron" data-label="USDT TRON">
    <div class="meta">
      <div class="label">USDT TRC20 - TRON</div>
      <div class="addr">TSMgEtSWjXbCM68RVJZj5kFPdh6GPLc5C2</div>
    </div>
    <div class="qr" id="qr-tron"></div>
    <div class="actions">
      <button class="btn copy" data-copy="TSMgEtSWjXbCM68RVJZj5kFPdh6GPLc5C2">Copiar</button>
      <a class="linkbtn open" href="tron:TSMgEtSWjXbCM68RVJZj5kFPdh6GPLc5C2" target="_blank" rel="noopener">Abrir</a>
    </div>
  </div>

  <!-- BTC Lightning: QR com apenas o invoice/handle (sem 'lightning:'), copiar endereço puro, abrir usa lightning:URI -->
  <div class="card" data-addr="cryingpropane83@walletofsatoshi.com" data-type="lightning" data-label="BTC Lightning">
    <div class="meta">
      <div class="label">BTC Lightning</div>
      <div class="addr">cryingpropane83@walletofsatoshi.com</div>
    </div>
    <div class="qr" id="qr-lightning"></div>
    <div class="actions">
      <button class="btn copy" data-copy="cryingpropane83@walletofsatoshi.com">Copiar</button>
      <a class="linkbtn open" href="lightning:cryingpropane83@walletofsatoshi.com" target="_blank" rel="noopener">Abrir</a>
    </div>
  </div>

  <footer>
  </footer>
</div>

<script>
/* Gera QR usando API pública como fallback. Para privacidade, substitua por qrcode.min.js local. */
function makeQRImage(text, size=96){
  const img = document.createElement('img');
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&data='+encodeURIComponent(text);
  img.alt = text;
  img.width = size; img.height = size;
  return img;
}

/* Inicialização */
document.addEventListener('DOMContentLoaded', ()=>{
  // PIX: não gerar QR (já deixado vazio)
  // Para TRON e LIGHTNING: gerar QR com APENAS o endereço (data-addr)
  document.querySelectorAll('.card[data-addr]').forEach(card=>{
    const addr = card.dataset.addr; // endereço puro, sem prefixo
    const type = card.dataset.type;
    const qrContainer = card.querySelector('.qr');
    if(qrContainer){
      // Para TRON e Lightning geramos QR com o endereço puro
      const qrEl = makeQRImage(addr, 96);
      qrContainer.appendChild(qrEl);
    }
  });

  // Copiar: todos os botões têm atributo data-copy com o texto a copiar (PIX usa URL)
  document.querySelectorAll('.copy').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const text = btn.dataset.copy || '';
      try{
        await navigator.clipboard.writeText(text);
        const original = btn.textContent;
        btn.textContent = 'Copiado';
        setTimeout(()=>btn.textContent = original, 1200);
      }catch(e){
        const original = btn.textContent;
        btn.textContent = 'Erro';
        setTimeout(()=>btn.textContent = original, 1200);
      }
    });
  });

  // Links "Abrir" já configurados no HTML: PIX -> URL, TRON -> tron:URI, LIGHTNING -> lightning:URI
});
</script>
</body>
</html>
